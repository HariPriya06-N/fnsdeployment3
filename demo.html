<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Section</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #fff;
        }

        .image-section {
            text-align: center;
            margin: 40px auto;
            padding: 0 48px;
            position: relative;
            max-width: 800px;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }


        .left-img img,
        .right-img img {
            width: 50%; /* Side images take half of main image */
            height: auto;
        }

        .main-img {
            flex: 1; /* Allows main image to take more space */
        }

        .main-img img {
            width: 100%;
            max-width: 400px; /* Increased main image width */
            height: auto;
            display: block;
        }
        .circle {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(245, 158, 11, 0.3);
        }

        .circle-1 {
            top: -20px;
            left: -30px;
        }

        .circle-2 {
            bottom: -20px;
            right: -30px;
        }

        .text-below {
            text-align: left;
            margin-top: 20px;
            font-size: 25px;
            color: #333;
            max-width: 600px;
            margin-left: 20px;
        }

        .bold-text {
            font-weight: bold;
            color: black;
            display: block; /* Moves each word to new line */
        }

        .thin-text {
            font-weight: 300;
            color: rgba(0, 0, 0, 0.7);
            display: block; /* Moves to new line */
        }
    </style>
</head>
<body>

    <section class="image-section">
        <div class="container">
            <div class="left-img">
                <img src="left-image.jpg" alt="Left Image">
            </div>
            <div class="main-img">
                <img src="img1.png" alt="Main Image">
                <div class="circle circle-1"></div>
                <div class="circle circle-2"></div>
            </div>
            <div class="right-img">
                <img src="right-img.jpg" alt="Right Image">
            </div>
        </div>
        
        <p class="text-below">
            <span class="bold-text">Fotogency deals with first</span> 
            <span class="bold-text">class photography</span>  
            <span class="thin-text">orphan services.</span>
        </p>
    </section>

</body>
</html>
